<!DOCTYPE html>
<html>
<head>
  <title>VideoHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 20px; background:#111; position:sticky; top:0;
    }

    .logo { font-size:20px; font-weight:bold; }

    .search input {
      padding:8px; border:none; border-radius:5px; width:200px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card {
      background:#1c1c1c;
      border-radius:10px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover { transform:scale(1.05); }

    video { width:100%; }

    .title { padding:10px; font-size:14px; }

    /* Popup */
    #popup {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.9);
      display:flex; justify-content:center; align-items:center;
      z-index:999;
    }

    .box {
      background:#222;
      padding:30px;
      border-radius:10px;
      text-align:center;
    }

    button {
      padding:10px 20px;
      margin:10px;
      border:none;
      cursor:pointer;
    }

    .yes { background:green; color:white; }
    .no { background:red; color:white; }
  </style>
</head>

<body>

<header>
  <div class="logo">🎬 VideoHub</div>
  <div class="search">
    <input type="text" placeholder="Search..." onkeyup="searchVideos(this.value)">
  </div>
</header>

<div class="grid" id="videos">

  <div class="card">
    <video controls>
      <source src="video1.mp4">
    </video>
    <div class="title">Sample Video 1</div>
  </div>

  <div class="card">
    <video controls>
      <source src="video2.mp4">
    </video>
    <div class="title">Sample Video 2</div>
  </div>

</div>

<!-- Age Gate -->
<div id="popup">
  <div class="box">
    <h2>Access Check</h2>
    <p>Please confirm you are allowed to view this site.</p>
    <button class="yes" onclick="enter()">Continue</button>
    <button class="no" onclick="exit()">Exit</button>
  </div>
</div>

<script>
function searchVideos(q){
  let cards=document.getElementsByClassName("card");
  q=q.toLowerCase();
  for(let i=0;i<cards.length;i++){
    let t=cards[i].innerText.toLowerCase();
    cards[i].style.display=t.includes(q)?"block":"none";
  }
}

if(localStorage.getItem("ok")==="yes"){
  document.getElementById("popup").style.display="none";
}

function enter(){
  localStorage.setItem("ok","yes");
  document.getElementById("popup").style.display="none";
}

function exit(){
  window.location.href="https://www.google.com";
}
</script>

</body>
</html>
